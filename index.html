<!DOCTYPE html>
<html>
<head>
  <title>PTFS Aircraft Selector</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>PTFS Aircraft & Airport Selector</h1>

  <div class="selector-container">

    <!-- Aircraft Dropdown -->
    <div class="dropdown">
      <button class="dropdown-btn">Choose Aircraft ▼</button>
      <div class="dropdown-menu">
        <label><input type="checkbox" value="cessna172"> Cessna 172</label>
        <label><input type="checkbox" value="kingair260"> King Air 260</label>
        <label><input type="checkbox" value="a350"> Airbus A350</label>
        <label><input type="checkbox" value="b787"> Boeing 787</label>
        <label><input type="checkbox" value="beluga"> Airbus Beluga</label>
        <label><input type="checkbox" value="caravan"> Cessna Caravan Cargo</label>
        <label><input type="checkbox" value="c17"> C-17 Globemaster</label>
        <label><input type="checkbox" value="c40"> C-40 Clipper</label>
        <label><input type="checkbox" value="c32"> C-32</label>
        <label><input type="checkbox" value="vc25"> VC-25 (Air Force One)</label>
        <label><input type="checkbox" value="p38"> P-38 Lightning</label>
        <label><input type="checkbox" value="sr71"> SR-71 Blackbird</label>
      </div>
    </div>

    <!-- From Airport Dropdown -->
    <div class="dropdown">
      <button class="dropdown-btn">From Airport ▼</button>
      <div class="dropdown-menu">
        <label><input type="checkbox" value="larnaca"> Larnaca</label>
        <label><input type="checkbox" value="perth"> Perth International</label>
        <label><input type="checkbox" value="keflavik"> Keflavik</label>
        <label><input type="checkbox" value="pingeyri"> Pingeyri</label>
        <label><input type="checkbox" value="mellor"> Mellor</label>
        <label><input type="checkbox" value="training"> Training Center</label>
        <label><input type="checkbox" value="garry"> Airbase Garry</label>
        <label><input type="checkbox" value="mcconnell"> McConnell</label>
        <label><input type="checkbox" value="scampton"> RAF Scampton</label>
        <label><input type="checkbox" value="barra"> Barra</label>
      </div>
    </div>

    <!-- To Airport Dropdown -->
    <div class="dropdown">
      <button class="dropdown-btn">To Airport ▼</button>
      <div class="dropdown-menu">
        <label><input type="checkbox" value="larnaca"> Larnaca</label>
        <label><input type="checkbox" value="perth"> Perth International</label>
        <label><input type="checkbox" value="keflavik"> Keflavik</label>
        <label><input type="checkbox" value="pingeyri"> Pingeyri</label>
        <label><input type="checkbox" value="mellor"> Mellor</label>
        <label><input type="checkbox" value="training"> Training Center</label>
        <label><input type="checkbox" value="garry"> Airbase Garry</label>
        <label><input type="checkbox" value="mcconnell"> McConnell</label>
        <label><input type="checkbox" value="scampton"> RAF Scampton</label>
        <label><input type="checkbox" value="barra"> Barra</label>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
