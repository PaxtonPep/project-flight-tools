<!DOCTYPE html>
<html>
<head>
  <title>PTFS Flight Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>PTFS Flight Generator</h1>

  <div class="panel">

    <!-- Aircraft Selector -->
    <div class="section">
      <h2>Select Aircraft</h2>
      <input type="text" id="aircraft-search" class="search" placeholder="Search aircraft...">
      <div id="aircraft-list" class="list"></div>
    </div>

    <!-- From Airport -->
    <div class="section">
      <h2>From Airport</h2>
      <input type="text" id="from-search" class="search" placeholder="Search airports...">
      <div id="from-list" class="list"></div>
    </div>

    <!-- To Airport -->
    <div class="section">
      <h2>To Airport</h2>
      <input type="text" id="to-search" class="search" placeholder="Search airports...">
      <div id="to-list" class="list"></div>
    </div>

    <!-- Gamepass Selector -->
    <div class="section">
      <h2>Gamepasses</h2>
      <label><input type="checkbox" id="gp-military"> Military</label>
      <label><input type="checkbox" id="gp-cargo"> Cargo</label>
      <label><input type="checkbox" id="gp-heli"> Helicopter</label>
      <label><input type="checkbox" id="gp-seaplane"> Seaplane</label>
      <label><input type="checkbox" id="gp-vip"> VIP</label>
    </div>

    <!-- Generate Button -->
    <button id="generate-btn">Generate Random Flight</button>

    <!-- Output -->
    <div id="output"></div>

  </div>

  <script type="module" src="ui.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
