<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Flight Tools</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="plane"></div>
    <p class="loadingText">PRELOADING CORE ASSETS...</p>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="hidden">
    <h1>Project Flight Airport Selector</h1>

    <input type="text" id="searchBox" placeholder="Search airport...">

    <select id="airportSelect">
      <option value="LCLK">Larnaca (LCLK)</option>
      <option value="LCPH">Paphos (LCPH)</option>
      <option value="LCRA">RAF Akrotiri (LCRA)</option>
      <option value="MDAB">Arroyo Barril (MDAB)</option>
      <option value="MDCR">Cabo Rojo (MDCR)</option>
      <option value="MDST">Cibao (MDST)</option>
      <option value="MDPC">Punta Cana (MDPC)</option>
      <option value="EFKT">Kittilä (EFKT)</option>
      <option value="MTCA">Antoine-Simon (MTCA)</option>
      <option value="GCLP">Gran Canaria (GCLP)</option>
      <option value="LEMH">Menorca (LEMH)</option>
      <option value="EGKK">Gatwick (EGKK)</option>
      <option value="EGHI">Southampton (EGHI)</option>
    </select>

    <p id="selectedAirport"></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
